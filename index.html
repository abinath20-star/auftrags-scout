<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuftragsScout</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 10px;
    }

    .box {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      cursor: pointer;
      border-radius: 6px;
      border: none;
      background: #007bff;
      color: white;
    }

    button:hover {
      background: #0056b3;
    }

    input {
      padding: 6px;
      margin: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
    }

    th {
      background: #eee;
    }
  </style>
</head>

<body>

  <h1>AuftragsScout</h1>

  <!-- Einstellungen -->
  <div class="box">
    <h3>Einstellungen</h3>

    <label>Kürzel:</label>
    <input id="code" placeholder="TT">

    <label>Name:</label>
    <input id="name" placeholder="Name">

    <br>
    <button onclick="saveSettings()">Speichern</button>
  </div>

  <!-- Datei laden -->
  <div class="box">
    <h3>Datei laden (CSV)</h3>

    <input type="file" id="fileInput">
    <button onclick="loadFile()">Laden</button>
  </div>

  <!-- Tabelle -->
  <div class="box">
    <h3>Tagesliste</h3>

    <table id="table">
      <thead>
        <tr>
          <th>Zeit</th>
          <th>Ort</th>
          <th>Straße</th>
          <th>Sparte</th>
          <th>Auftrag</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    function saveSettings() {
      localStorage.setItem("code", document.getElementById("code").value);
      localStorage.setItem("name", document.getElementById("name").value);
      alert("Gespeichert!");
    }

    function loadFile() {
      const file = document.getElementById("fileInput").files[0];
      if (!file) return alert("Bitte Datei wählen");

      const reader = new FileReader();

      reader.onload = function(e) {
        const text = e.target.result;
        const rows = text.split("\n");

        const table = document.querySelector("#table tbody");
        table.innerHTML = "";

        rows.forEach(row => {
          const cols = row.split(";");
          if (cols.length < 5) return;

          const tr = document.createElement("tr");

          cols.forEach(col => {
            const td = document.createElement("td");
            td.textContent = col;
            tr.appendChild(td);
          });

          table.appendChild(tr);
        });
      };

      reader.readAsText(file);
    }
  </script>

</body>
</html>
